name: CI com GitHub Actions

on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # esse step faz o download do código do seu repositório para dentro da máquina virtual onde o GitHub está executando o seu pipeline
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar o Docker Buildx
        uses: docker/setup-buildx-action@v3
        # O Buildx ajuda a otimizar o cache das camadas do Docker no GitHub Actions

      - name: Construir e enviar a imagem Docker (dockerhub)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/minha-api-spring:latest
            ${{ secrets.DOCKER_USERNAME }}/minha-api-spring:${{ github.run_id }}

      - name: Construir e enviar a imagem para o Amazon ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.IMAGE_REPO_URL }}:latest
            ${{ secrets.IMAGE_REPO_URL }}:${{ github.run_id }}



